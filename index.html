<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vtu-easy</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, sans-serif;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  background: #0b0f19;
  color:white;
}

/* BACKGROUND */
#bg{
  position:fixed;
  inset:0;
  z-index:-5;
}
#bg video, #bg img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 18px;
  z-index:9999;

  background:rgba(0, 0, 0, 0);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* LOGO */
.logo{
  font-size:22px;
  font-weight:600;
  color:white;
  text-decoration:none;

  text-shadow:
    0 0 6px rgba(255,255,255,0.4),
    0 0 12px rgba(0,150,255,0.3);
}

/* NOTIFICATION */
.notify{
  position:relative;
  background:rgba(255,255,255,0.08);
  padding:8px;
  border-radius:50%;
  backdrop-filter:blur(10px);
  cursor:pointer;
}
.notify::after{
  content:'1';
  position:absolute;
  top:-4px;
  right:-4px;
  background:red;
  font-size:9px;
  padding:3px 5px;
  border-radius:50%;
}

/* MAIN */
.main{
  padding-top:100px;
  padding-bottom:180px;
  display:flex;
  justify-content:center;
}

.container{
  text-align:center;
  width:100%;
  max-width:900px;
}

/* TITLE */
.title{
  font-size:30px;
  font-weight:700;
  margin-bottom:25px;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  width:250px;
  padding:24px;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  transition:.3s;
  cursor:pointer;
}
.card:hover{
  transform:translateY(-5px);
  background:rgba(255,255,255,0.15);
}

/* SOCIAL BAR */
.social-bar{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:16px;
  padding:10px 18px;
  border-radius:20px;

  background:rgba(0,255,150,0.12);
  backdrop-filter:blur(18px);

  z-index:999;
}
.social-bar i{
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
}

/* FOOTER */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  padding:12px 20px;

  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.08);

  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;

  font-size:14px;
}

/* FOOTER GROUPS */
.footer-left, .footer-right{
  display:flex;
  gap:18px;
}

footer a{
  color:white;
  text-decoration:none;
  opacity:0.8;
}
footer a:hover{
  opacity:1;
}

/* MOBILE */
@media(max-width:768px){

  .cards{
    flex-direction:column;
    align-items:center;
  }

  .title{
    font-size:24px;
  }

  .main{
    padding-bottom:220px;
  }

  footer{
    flex-direction:column;
    gap:6px;
  }
}

/* SMALL MOBILE */
@media(max-width:400px){
  .social-bar{
    gap:10px;
    padding:8px 12px;
  }

  .social-bar i{
    width:28px;
    height:28px;
    font-size:14px;
  }

  .logo{
    font-size:18px;
  }
}

</style>
</head>

<body>

<!-- BG -->
<div id="bg"></div>

<!-- HEADER -->
<header>
  <a href="/" class="logo">vtu-easy.com</a>

  <div class="notify" onclick="goNotify()">
    <i class="fas fa-bell"></i>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <div class="container">

    <div class="title">Build Your Learning</div>

    <div class="cards">

      <div class="card" onclick="go('tools.html')">
        <h2>Tools</h2>
        <p>Boost your productivity</p>
      </div>

      <div class="card" onclick="go('syllabus.html')">
        <h2>Syllabus</h2>
        <p>Explore VTU syllabus</p>
      </div>

      <div class="card">
        <h2>Coming Soon</h2>
        <p>New features</p>
      </div>

    </div>

  </div>
</div>

<!-- SOCIAL -->
<div class="social-bar">
  <i class="fab fa-github"></i>
  <i class="fab fa-discord"></i>
  <i class="fab fa-instagram"></i>
  <i class="fab fa-youtube"></i>
  <i class="fab fa-linkedin"></i>
</div>

<!-- FOOTER -->
<footer>

  <div class="footer-left">
    <a href="#">Contact</a>
    <a href="#">Support</a>
    <a href="#">Community</a>
  </div>

  <div>© vtu-easy.com</div>

  <div class="footer-right">
    <a href="#">Privacy Policy</a>
    <a href="#">Terms</a>
    <a href="#">Legal Licence</a>
    <a href="#">Cookies</a>
  </div>

</footer>

<script>

/* NAVIGATION */
function go(url){
  window.location.href = url;
}

function goNotify(){
  window.location.href = "notifications.html";
}

/* BACKGROUND SYSTEM */
const bg = document.getElementById("bg");

/* LOAD CACHE */
window.onload = () => {
  const saved = localStorage.getItem("bg-image");
  if(saved){
    bg.innerHTML = `<img src="${saved}">`;
  }
};

/* DRAG DROP */
document.body.addEventListener("dragover", e => e.preventDefault());

document.body.addEventListener("drop", e=>{
  e.preventDefault();

  const file = e.dataTransfer.files[0];
  if(!file) return;

  const name = file.name.toLowerCase();

  const isImage =
    file.type.startsWith("image") ||
    name.match(/\.(jpg|jpeg|png|webp|bmp|gif|heic|avif)$/);

  const isVideo =
    file.type.startsWith("video") ||
    name.match(/\.(mp4|webm|mov|mkv)$/);

  if(isImage){
    const reader = new FileReader();
    reader.onload = () => {
      localStorage.setItem("bg-image", reader.result);
      bg.innerHTML = `<img src="${reader.result}">`;
    };
    reader.readAsDataURL(file);
  }

  else if(isVideo){
    const url = URL.createObjectURL(file);
    bg.innerHTML = `<video src="${url}" autoplay muted loop playsinline></video>`;
  }

  else{
    alert("Unsupported file type");
  }
});

</script>

</body>
</html>
